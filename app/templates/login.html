{% extends "base.html" %}

{% block content %}
  <form action="" method="post" autocomplete="off" novalidate>
    {{ form.hidden_tag() }}
    <p>
      {{ form.password.label }}<br />
      {{ form.password(size=32) }}
      {% for error in form.password.errors %}
        <span style="color: red;">[{{ error }}]</span>
      {% endfor %}
    </p>
    <p>
      {{ form.submit() }}
    </p>
  </form>
{% endblock %}
